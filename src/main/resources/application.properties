spring.application.name=busapp

# 1. Cấu hình kết nối MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bus_be_b?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456 # SỬA LẠI THÀNH MẬT KHẨU MYSQL CỦA BẠN
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Cấu hình JPA cho MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect